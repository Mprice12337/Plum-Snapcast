version: '3.8'

services:
  snapcast-server:
    build:
      context: ../backend
      dockerfile: ../backend/Dockerfile
    image: ${DOCKER_USERNAME}/plum-snapcast-server:latest
    container_name: plum-snapcast-server
    hostname: snapserver
    network_mode: host
    privileged: true
    devices:
      - /dev/snd:/dev/snd
      # Bluetooth device (may not exist on all hosts)
    # Uncomment if Bluetooth device path is different
    # - /dev/hci0:/dev/hci0
    environment:
      - TZ=${TZ:-America/Los_Angeles}
      # Plexamp settings (separate container, requires env config)
      - PLEXAMP_ENABLED=${PLEXAMP_ENABLED:-0}
      - PLEXAMP_SOURCE_NAME=${PLEXAMP_SOURCE_NAME:-Plexamp}
      - PLEXAMP_CLAIM_TOKEN=${PLEXAMP_CLAIM_TOKEN:-}
      - PLEXAMP_SERVER_NAME=${PLEXAMP_SERVER_NAME:-Plum Audio}
      # Infrastructure settings
      - PIPE_CONFIG_ENABLED=0
      - META_CONFIG_ENABLED=0
      - HTTPS_ENABLED=1
      - SKIP_CERT_GENERATION=0
      # Snapclient settings (hardware-specific)
      - SNAPCLIENT_ENABLED=1
      - SNAPCLIENT_HOST=localhost
      - SNAPCLIENT_SOUNDCARD=${SNAPCLIENT_SOUNDCARD:-hw:Headphones}
      - SNAPCLIENT_LATENCY=0
      # Federation API port (integration/federation settings managed via web UI)
      - FEDERATION_API_PORT=${FEDERATION_API_PORT:-5001}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - snapcast-config:/app/config
      - snapcast-data:/app/data
      - snapcast-certs:/app/certs
      - snapcast-fifos:/tmp/snapcast-fifos
      - plexamp-data:/tmp/plexamp-state:ro
      - coverart-cache:/usr/share/snapserver/snapweb/coverart
      - bluetooth-pairings:/var/lib/bluetooth
    restart: unless-stopped
    healthcheck:
      # Check if snapserver HTTP is responding (use the web UI root instead of JSON-RPC)
      test: ["CMD", "sh", "-c", "curl -f http://localhost:1780/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  snapcast-frontend:
    build:
      context: ../frontend
      dockerfile: ../frontend/Dockerfile
    image: ${DOCKER_USERNAME}/plum-snapcast-frontend:latest
    container_name: plum-snapcast-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    environment:
      - SNAPCAST_HOST=${SNAPCAST_HOST:-localhost}
      - SNAPCAST_PORT=${SNAPCAST_PORT:-1704}
    extra_hosts:
      - "snapcast-host:host-gateway"
    restart: unless-stopped
    depends_on:
      - snapcast-server
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  plexamp:
    build:
      context: ../backend/plexamp
      dockerfile: Dockerfile
    image: ${DOCKER_USERNAME}/plum-plexamp:latest
    container_name: plum-plexamp
    hostname: plexamp
    network_mode: host
    environment:
      - TZ=${TZ:-America/Los_Angeles}
      - PLEXAMP_CLAIM_TOKEN=${PLEXAMP_CLAIM_TOKEN:-}
      - PLEXAMP_PLAYER_NAME=${PLEXAMP_SERVER_NAME:-Office Plexamp}
    volumes:
      - plexamp-data:/app/plexamp
      - snapcast-fifos:/tmp/snapcast-fifos
    restart: unless-stopped
    profiles:
      - plexamp
    # Healthcheck disabled: Plexamp's connection testing conflicts with healthcheck curl requests
    # causing HTTP server deadlock. Plexamp logs "Plexamp is now signed in and ready!" when healthy.
    healthcheck:
      disable: true

volumes:
  snapcast-config:
    driver: local
  snapcast-data:
    driver: local
  snapcast-certs:
    driver: local
  snapcast-fifos:
    driver: local
  plexamp-data:
    driver: local
  coverart-cache:
    driver: local
  bluetooth-pairings:
    driver: local