# Spotify FIFO Keeper
# Prevents spotifyd from blocking on FIFO writes when no Snapcast stream exists
# Reads and discards data from FIFO when stream is not active
[program:spotify-fifo-keeper]
command=/bin/bash /app/scripts/spotify-fifo-keeper.sh
user=snapcast
directory=/app
priority=20
autostart=false
autorestart=true
startsecs=3
startretries=999
stopasgroup=true
killasgroup=true
stdout_logfile=/var/log/supervisord/spotify-fifo-keeper.log
stderr_logfile=/var/log/supervisord/spotify-fifo-keeper_err.log
