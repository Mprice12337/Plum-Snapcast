# OBEX daemon for Bluetooth file transfer and cover art retrieval
# Required for AVRCP cover art support via BIP (Basic Imaging Profile)
# obexd provides the org.bluez.obex.Image1 D-Bus interface for fetching album art
#
# NOTE: Using --system-bus (-s) to run on system bus instead of session bus.
# This allows bluetooth-control-script to access org.bluez.obex interfaces.
# Also using -n to run in foreground for proper supervisord management.
[program:obexd]
command=/bin/sh -c "while [ ! -S /var/run/dbus/system_bus_socket ]; do sleep 0.5; done && sleep 2 && /usr/lib/bluetooth/obexd -n -s -d"
user=root
priority=17
autostart=false
autorestart=true
startsecs=5
startretries=3
stdout_logfile=/var/log/supervisord/obexd.log
stdout_logfile_maxbytes=10MB
stderr_logfile=/var/log/supervisord/obexd_err.log
stderr_logfile_maxbytes=10MB
