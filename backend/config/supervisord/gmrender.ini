# gmrender-resurrect (DLNA/UPnP Media Renderer) - Controlled via GUI settings
# Built from source with GStreamer for audio processing and UPnP discovery via Avahi
# Outputs audio to FIFO pipe for Snapcast integration
# Device name is read from /app/config/dlna-device-name.txt (written by integrations API)
[program:gmrender]
command=/bin/sh -c 'UUID_ARG=""; if [ -n "${DLNA_UUID}" ]; then UUID_ARG="--uuid ${DLNA_UUID}"; fi; sleep 5 && /usr/local/bin/gmediarender --friendly-name "$(cat /app/config/dlna-device-name.txt 2>/dev/null || echo "Plum Audio")" $UUID_ARG --gstout-audiopipe "audioresample ! audio/x-raw,rate=44100,format=S16LE,channels=2 ! filesink location=/tmp/dlna-fifo" --gstout-audiodevice "" --logfile stdout'
user=snapcast
directory=/app
environment=HOME="/app",GST_DEBUG="2",DISPLAY=":0"
priority=50
autostart=false
autorestart=true
startsecs=10
startretries=3
stopasgroup=true
killasgroup=true
stdout_logfile=/var/log/supervisord/gmrender.log
stdout_logfile_maxbytes=50MB
stderr_logfile=/var/log/supervisord/gmrender_err.log
stderr_logfile_maxbytes=10MB
