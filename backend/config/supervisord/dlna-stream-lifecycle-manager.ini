# DLNA Stream Lifecycle Manager
# Monitors gmrender metadata file and dynamically creates/removes Snapcast stream
# Creates stream when DLNA playback starts, removes after idle timeout when playback stops
[program:dlna-stream-lifecycle-manager]
command=/usr/bin/python3 /app/scripts/dlna-stream-lifecycle-manager.py
user=snapcast
directory=/app
priority=50
autostart=false
autorestart=true
startsecs=5
startretries=999
stopasgroup=true
killasgroup=true
stdout_logfile=/var/log/supervisord/dlna-stream-lifecycle-manager.log
stderr_logfile=/var/log/supervisord/dlna-stream-lifecycle-manager_err.log
environment=PYTHONUNBUFFERED="1"
