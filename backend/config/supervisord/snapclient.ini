# D-Bus system bus - runs as root initially, then drops to messagebus
[program:dbus]
command=/bin/sh -c "rm -f /var/run/dbus/pid && /usr/bin/dbus-daemon --system --nofork --nopidfile"
priority=1
autostart=true
autorestart=true
startsecs=5
startretries=3
stdout_logfile=/var/log/supervisord/dbus.log
stdout_logfile_maxbytes=10MB
stderr_logfile=/var/log/supervisord/dbus_err.log
stderr_logfile_maxbytes=10MB

# Avahi daemon - runs as root with --no-drop-root flag
[program:avahi]
command=/bin/sh -c "while [ ! -S /var/run/dbus/system_bus_socket ]; do sleep 0.5; done && sleep 2 && /usr/sbin/avahi-daemon --no-chroot --no-drop-root --debug"
priority=10
autostart=true
autorestart=true
startsecs=10
startretries=3
stdout_logfile=/var/log/supervisord/avahi.log
stdout_logfile_maxbytes=10MB
stderr_logfile=/var/log/supervisord/avahi_err.log
stderr_logfile_maxbytes=10MB

# Snapserver - runs as snapcast user
[program:snapserver]
command=/usr/bin/snapserver -c /app/config/snapserver.conf
user=snapcast
directory=/app
priority=30
autostart=true
autorestart=true
startsecs=5
startretries=3
stdout_logfile=/var/log/supervisord/snapserver.log
stdout_logfile_maxbytes=50MB
stderr_logfile=/var/log/supervisord/snapserver_err.log
stderr_logfile_maxbytes=10MB

# Shairport-sync - runs as root for Avahi access
[program:shairport-sync]
command=/bin/sh -c "sleep 10 && /usr/local/bin/shairport-sync --configfile=/app/config/shairport-sync.conf -v"
directory=/app
environment=HOME="/app"
priority=40
autostart=true
autorestart=unexpected
startsecs=20
startretries=3
stdout_logfile=/var/log/supervisord/shairport.log
stdout_logfile_maxbytes=50MB
stderr_logfile=/var/log/supervisord/shairport_err.log
stderr_logfile_maxbytes=10MB

# Snapclient - Audio output client (runs as snapcast user)
# Wait 15 seconds for snapserver to be fully ready before connecting
# Audio output device is configured via GUI (Settings → Audio)
# Load settings from get-settings.py on each start to pick up device changes
# Host/port are read from /app/data/snapclient_target (format: host:port)
# Default: 127.0.0.1:1705 (local server)
# For remote: e.g., 192.168.201.133:1704
[program:snapclient]
command=/bin/sh -c 'if [ "${SNAPCLIENT_ENABLED}" = "1" ]; then sleep 15 && eval "$(python3 /app/scripts/get-settings.py 2>/dev/null || true)" && SNAPCLIENT_TARGET=$(cat /app/data/snapclient_target 2>/dev/null || echo "127.0.0.1:1705") && SNAPCLIENT_HOST=$(echo $SNAPCLIENT_TARGET | cut -d: -f1) && SNAPCLIENT_PORT=$(echo $SNAPCLIENT_TARGET | cut -d: -f2) && /usr/bin/snapclient --host ${SNAPCLIENT_HOST} --port ${SNAPCLIENT_PORT} --soundcard "${AUDIO_OUTPUT_DEVICE:-hw:Headphones}" --latency ${SNAPCLIENT_LATENCY:-0}; else sleep infinity; fi'
user=snapcast
directory=/app
priority=50
autostart=true
autorestart=true
startsecs=20
startretries=3
stdout_logfile=/var/log/supervisord/snapclient.log
stdout_logfile_maxbytes=50MB
stderr_logfile=/var/log/supervisord/snapclient_err.log
stderr_logfile_maxbytes=10MB