# Spotify Stream Lifecycle Manager
# Monitors spotifyd D-Bus MPRIS PlaybackStatus and dynamically creates/removes Snapcast stream
# Creates stream when playback starts, removes after idle timeout when playback stops
[program:spotify-stream-lifecycle-manager]
command=/usr/bin/python3 /app/scripts/spotify-stream-lifecycle-manager.py
user=snapcast
directory=/app
priority=25
autostart=false
autorestart=true
startsecs=5
startretries=999
stopasgroup=true
killasgroup=true
stdout_logfile=/var/log/supervisord/spotify-stream-lifecycle-manager.log
stderr_logfile=/var/log/supervisord/spotify-stream-lifecycle-manager_err.log
environment=PYTHONUNBUFFERED="1"
