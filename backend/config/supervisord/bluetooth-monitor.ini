# Bluetooth Connection Monitor
# Monitors device connections/disconnections and resets discoverable mode when needed
[program:bluetooth-monitor]
command=/usr/bin/python3 /app/scripts/bluetooth-connection-monitor.py
user=root
priority=25
autostart=false
autorestart=true
startsecs=5
startretries=3
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
