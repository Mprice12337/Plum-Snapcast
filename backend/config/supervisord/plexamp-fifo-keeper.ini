# Plexamp FIFO Keeper
# Keeps Plexamp FIFO pipe open when no Snapcast stream exists
# Prevents ALSA file plugin from getting "Broken pipe" errors
# CRITICAL: Must start early so Plexamp entrypoint can detect a reader
[program:plexamp-fifo-keeper]
command=/bin/bash /app/scripts/plexamp-fifo-keeper.sh
user=snapcast
directory=/app
priority=20
autostart=false
autorestart=true
startsecs=3
startretries=999
stopasgroup=true
killasgroup=true
stdout_logfile=/var/log/supervisord/plexamp-fifo-keeper.log
stderr_logfile=/var/log/supervisord/plexamp-fifo-keeper_err.log
