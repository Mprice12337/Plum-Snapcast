<?xml version="1.0"?>
<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Allow snapcast user to own all shairport-sync D-Bus names (native and MPRIS) -->
  <policy user="snapcast">
    <!-- Native D-Bus interface (shairport-sync) -->
    <allow own="org.gnome.ShairportSync"/>
    <allow send_destination="org.gnome.ShairportSync"/>
    <allow send_interface="org.gnome.ShairportSync.RemoteControl"/>

    <!-- Instance-specific service names (explicit i1-i10 and wildcards) -->
    <allow own_prefix="org.gnome.ShairportSync"/>
    <allow send_destination="org.gnome.ShairportSync.i*"/>
    <allow send_interface="org.gnome.ShairportSync.i*.RemoteControl"/>

    <!-- MPRIS interface (base name) -->
    <allow own="org.mpris.MediaPlayer2.ShairportSync"/>
    <allow send_destination="org.mpris.MediaPlayer2.ShairportSync"/>
    <allow send_interface="org.mpris.MediaPlayer2"/>
    <allow send_interface="org.mpris.MediaPlayer2.Player"/>
    <allow send_interface="org.freedesktop.DBus.Properties"/>

    <!-- MPRIS interface (PID-based multi-instance support with prefix) -->
    <allow own_prefix="org.mpris.MediaPlayer2.ShairportSync"/>
    <allow send_destination="org.mpris.MediaPlayer2.ShairportSync.i*"/>
    <allow send_interface="org.mpris.MediaPlayer2"/>
    <allow send_interface="org.mpris.MediaPlayer2.Player"/>
  </policy>

  <!-- Allow root to own and communicate with all shairport-sync instances -->
  <policy user="root">
    <!-- Native D-Bus interface -->
    <allow own="org.gnome.ShairportSync"/>
    <allow send_destination="org.gnome.ShairportSync"/>
    <allow send_interface="org.gnome.ShairportSync.RemoteControl"/>

    <allow own_prefix="org.gnome.ShairportSync"/>
    <allow send_destination="org.gnome.ShairportSync.i*"/>
    <allow send_interface="org.gnome.ShairportSync.i*.RemoteControl"/>

    <!-- MPRIS interface -->
    <allow own="org.mpris.MediaPlayer2.ShairportSync"/>
    <allow send_destination="org.mpris.MediaPlayer2.ShairportSync"/>
    <allow send_interface="org.mpris.MediaPlayer2"/>
    <allow send_interface="org.mpris.MediaPlayer2.Player"/>
    <allow send_interface="org.freedesktop.DBus.Properties"/>

    <allow own_prefix="org.mpris.MediaPlayer2.ShairportSync"/>
    <allow send_destination="org.mpris.MediaPlayer2.ShairportSync.i*"/>
    <allow send_interface="org.mpris.MediaPlayer2"/>
    <allow send_interface="org.mpris.MediaPlayer2.Player"/>
  </policy>

  <!-- Allow avahi user to communicate with all shairport-sync instances -->
  <policy user="avahi">
    <allow send_destination="org.gnome.ShairportSync"/>
    <allow send_destination="org.gnome.ShairportSync.i*"/>
    <allow send_destination="org.mpris.MediaPlayer2.ShairportSync"/>
    <allow send_destination="org.mpris.MediaPlayer2.ShairportSync.i*"/>
  </policy>
</busconfig>