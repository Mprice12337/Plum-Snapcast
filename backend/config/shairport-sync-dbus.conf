<?xml version="1.0"?>
<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Allow snapcast user to own all shairport-sync D-Bus names (default and instance-specific) -->
  <policy user="snapcast">
    <!-- Default service name -->
    <allow own="org.gnome.ShairportSync"/>
    <allow send_destination="org.gnome.ShairportSync"/>
    <allow send_interface="org.gnome.ShairportSync.RemoteControl"/>

    <!-- Instance-specific service names (i1, i2, i3, ..., i10) -->
    <allow own="org.gnome.ShairportSync.i*"/>
    <allow send_destination="org.gnome.ShairportSync.i*"/>
    <allow send_interface="org.gnome.ShairportSync.i*.RemoteControl"/>
  </policy>

  <!-- Allow root to own and communicate with all shairport-sync instances -->
  <policy user="root">
    <allow own="org.gnome.ShairportSync"/>
    <allow send_destination="org.gnome.ShairportSync"/>
    <allow send_interface="org.gnome.ShairportSync.RemoteControl"/>

    <allow own="org.gnome.ShairportSync.i*"/>
    <allow send_destination="org.gnome.ShairportSync.i*"/>
    <allow send_interface="org.gnome.ShairportSync.i*.RemoteControl"/>
  </policy>

  <!-- Allow avahi user to communicate with all shairport-sync instances -->
  <policy user="avahi">
    <allow send_destination="org.gnome.ShairportSync"/>
    <allow send_destination="org.gnome.ShairportSync.i*"/>
  </policy>
</busconfig>