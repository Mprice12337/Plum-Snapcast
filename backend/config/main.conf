# BlueZ Configuration for Plum-Snapcast
# Enables persistent pairing for iOS devices using "Just Works" SSP

[General]
# Enable name caching
Name = %h

# Always store pairing information, even for "Just Works" SSP connections
# This is critical for iOS devices which use "Just Works" pairing without user confirmation
# Without this, iOS devices will connect temporarily but won't be able to reconnect
JustWorksRepairing = always

# Class of device: Audio/Video (Loudspeaker)
Class = 0x240414

# Enable pairable mode by default
Discoverable = true
DiscoverableTimeout = 0
Pairable = true
PairableTimeout = 0

# Automatically enable experimental features if needed
# Experimental = true

[Policy]
# Automatically connect to previously paired devices
AutoEnable = true
