# Mosquitto MQTT Broker Configuration
# Localhost-only broker for AirPlay multi-instance control

# Listen on localhost only (security)
listener 1883 127.0.0.1

# MQTT protocol
protocol mqtt

# Allow anonymous connections (localhost-only, no auth needed)
allow_anonymous true

# Logging
log_dest stderr
log_type error
log_type warning

# No persistence (metadata is transient)
persistence false

# Unlimited connections
max_connections -1
